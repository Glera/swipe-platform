bar{width:62%;max-width:260px;height:10px;border-radius:999px;background:#ffffff24;overflow:hidden}.preloader__fill{width:0%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#5ee6a8,#3a9bff);transition:width .3s ease-out}.preloader__progress{font-size:13px;opacity:.7;font-variant-numeric:tabular-nums}</style>
